  <div class="book-container">
    <h1 class="title">✉️ A Letter from Mary</h1>
    <div class="nav-bar">
      <div style="font-size: 18px; font-weight: bold; color: #2D3436;">📖 互动绘本阅读</div>

    <div style="text-align: center;"><div class="page-indicator" id="pageIndicator">第 1 页 / 共 18 页</div></div>

      <div class="reading-status" id="readingStatus">准备跟读</div>
      <div class="countdown" id="countdown"></div>

      <div class="stars" id="starsDisplay" style="font-size: 40px; margin: 10px 0;"></div>

        <div style="font-weight: bold; margin-bottom: 12px; color: #636E72;">📝 发音详情：</div>

          <button class="btn btn-secondary" id="retryBtn">🔄 再试一次</button>

        </div>
      </div>

      <button class="btn btn-primary" id="readPageBtn">🔊 朗读本页</button>

  <script>
    const bookData = [
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/L7NXoGZV4oL7AScRx7C2DH.png', sentences: [{ en: "A Letter to Jenny By Mary", cn: "给珍妮的信 作者：玛丽" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/YVZWRnWi3c2U7Wkoi7UVHC.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/n7B3dunEPkohG9xpYKNxiR.png', sentences: [{ en: "Dear Jenny,", cn: "亲爱的珍妮：" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/95Wm4zjimYHGUYakHehDm7.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/WJgF8YLs6uXh6EXXnXiYqm.png', sentences: [{ en: "I'm sorry that we can't meet very often.", cn: "很抱歉我们不能经常见面。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/kkd7FuM6xSSGXREuwqcBfX.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/XgMuJXorpM6AvMR8RqT2mj.png', sentences: [{ en: "I am very busy every day.", cn: "我每天都很忙。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/JkPVEKR5t6mxCEH5jZ5Mhe.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/Y3PJ5MtdyiK2L9p5x4uwHX.png', sentences: [{ en: "When the bell rings, the first class starts at 8 a.m.", cn: "铃声一响，第一节课就在早上8点开始了。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/9yCWUX9QJUGZRqZZcgRgLk.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/TPosEyKjod8jzg6cvvDGrM.png', sentences: [{ en: "Every day I have Chinese, maths and English.", cn: "每天我都要上语文课、数学课和英语课。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/MdAe9ZbJFBHf3gffRaYofi.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/QgPGmbVTiVsXkuQUjfL3pb.png', sentences: [{ en: "I don't like maths, but my parents say it's useful, so I must try harder.", cn: "我不喜欢数学，但我的父母说它很有用，所以我必须更加努力。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/TTGti2bi7JLwvHfGvyapPR.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/PawniEsB6bzPoS67XbfAx7.png', sentences: [{ en: "I know you have language courses and your favourite subject is Chinese, but I like English best.", cn: "我知道你在上语言课，你最喜欢的科目是语文，但我最喜欢英语。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/aHMEiAj2yM2WDeNmGuDNbP.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/coGfokGiTX3bToCkmP4RXX.png', sentences: [{ en: "I have learned every word by heart from the book!", cn: "书上的每个单词我都用心背熟了！" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/fqyHYovgayeQzV6XjYLk9e.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/jCUZ4jG3p2wLKaNfdPEijj.png', sentences: [{ en: "After class, I play soccer every Wednesday and Friday.", cn: "课后，我每周三和周五踢足球。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/f6BSF6MB4fMiPN4F6xymMj.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/7sBFcNtMoMJZSyLuAQw7cU.png', sentences: [{ en: "I have music class only once a week, but it's really a good time to relax.", cn: "我每周只有一次音乐课，但这确实是放松的好时候。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/YehFh9cbvKB4mKZnrFzLzi.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/5yPA75LzGmFiA5KHSBfiCJ.png', sentences: [{ en: "Last month, there was an art festival in my school and many students showed their talents on stage.", cn: "上个月，我们学校举办了艺术节，很多学生都上台展示了自己的才艺。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/b24PEN2baMoshSm2vivsJA.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/TMbtRgVGxziPGvwhmS9GvT.png', sentences: [{ en: "It was exciting.", cn: "真是令人兴奋。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/gqvutdyUNJYtoJvJr4iuKg.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/LSCJrhHfnuiuKmxNeAu8tP.png', sentences: [{ en: "I hope to take part in the festival next year.", cn: "我希望明年还能参加艺术节。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/oBahrSmSQ3T7aziCKsRX2m.mp3" },
      { image: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/HjzxmZznsvSgiEjRGfUE8V.png', sentences: [{ en: "Next Saturday, December 30th, I want to have a party in my home to celebrate my birthday.", cn: "下周六，12月30日，我想在家里开个派对庆祝我的生日。" }], audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/FtRLarZag4dDcoe3TumtWD.mp3" },

      "last": { phonetic: "[lɑːst]", translation: "adj. 最后的；上一个的", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/ut82VQ3uwJnu7zUveg4Dm6.mp3" },
      "month": { phonetic: "[mʌnθ]", translation: "n. 月", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/jbSWYGqwznvDLVnUVHmUSk.mp3" },
      "there": { phonetic: "[ðeə(r)]", translation: "adv. 在那里", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/mUkXxf4ieEDRYRDyj2CdxW.mp3" },
      "was": { phonetic: "[wɒz]", translation: "v. 是（is/am的过去式）", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/LMp4Y3wWPfattKZLRvddt4.mp3" },
      "an": { phonetic: "[æn]", translation: "art. 一个（元音前）", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/V5oiefy4ufWoMCpAremnzG.mp3" },
      "art": { phonetic: "[ɑːt]", translation: "n. 艺术；美术", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/qzK3Xrt85csTCqtP6mUBpZ.mp3" },
      "in": { phonetic: "[ɪn]", translation: "prep. 在...里面", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Cu6ptnfgA8JVGCRWfNd379.mp3" },
      "school": { phonetic: "[skuːl]", translation: "n. 学校", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/MyGpCDF9AYvbishsq5QDWM.mp3" },
      "many": { phonetic: "[ˈmeni]", translation: "adj. 许多的", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/j6jkBnGJfwJRnQZM6unzrE.mp3" },
      "student": { phonetic: "[ˈstjuːdnt]", translation: "n. 学生", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/PciweqGj9i5SvuskSC8FCW.mp3" },
      "show": { phonetic: "[ʃəʊ]", translation: "v. 展示；给...看", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/p6gSwtM5dY8yrueELRsrKm.mp3" },
      "their": { phonetic: "[ðeə(r)]", translation: "pron. 他们的", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/GBGdr8dZx3E44GGEEyzG37.mp3" },
      "on": { phonetic: "[ɒn]", translation: "prep. 在...上面", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Tq6GdNjKCz2vwo4QxBZduA.mp3" },
      "it": { phonetic: "[ɪt]", translation: "pron. 它", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/qwMNeCFTBM9NUL8DsYcKne.mp3" },
      "hope": { phonetic: "[həʊp]", translation: "v. 希望", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/AQBWGx6ijEgerap6oTr4ui.mp3" },
      "take": { phonetic: "[teɪk]", translation: "v. 拿；取；花费", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/xxYKHkFCVA9FtPwDt7FeWc.mp3" },
      "part": { phonetic: "[pɑːt]", translation: "n. 部分；角色", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/tADwFNDjhBcr3yPQnnkqK3.mp3" },
      "next": { phonetic: "[nekst]", translation: "adj. 下一个的", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/87Z99g2qWYgshXZoTykeJE.mp3" },
      "year": { phonetic: "[jɪə(r)]", translation: "n. 年", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/jayHwnE8386UErrALPmaxW.mp3" },
      "thirtieth": { phonetic: "[ˈθɜːtiəθ]", translation: "num. 第三十", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/gSsmf6fwLi5qUUzpi5K8Cf.mp3" },
      "want": { phonetic: "[wɒnt]", translation: "v. 想要", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/ktDJ3z52s39dvt8CEMd228.mp3" },
      "home": { phonetic: "[həʊm]", translation: "n. 家", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/WY38gj8mvjrd5LtcT2i2ka.mp3" },
      "can": { phonetic: "[kæn]", translation: "v. 能；会", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/3wwY9EbYXgRpCKjEQot8ye.mp3" },
      "come": { phonetic: "[kʌm]", translation: "v. 来", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/gHd6K2t6Dvgkq6SHuoetnN.mp3" },
      "light": { phonetic: "[laɪt]", translation: "n. 光；灯；v. 点燃", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/6mAZDxduS35cfj23TqwH8H.mp3" },
      "for": { phonetic: "[fɔː(r)]", translation: "prep. 为了；给", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/3992eupVfG2H7s99DNdNYH.mp3" },
      "me": { phonetic: "[mi]", translation: "pron. 我（宾格）", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/zayvEJdzSWnrPvKMPDNtv9.mp3" },
      "make": { phonetic: "[meɪk]", translation: "v. 制作；使得", audio: "https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/P7vUPTRaHPfGPUogAt99HB.mp3" }
    };

    const wordVariations = {
      'parents': 'parent',
      'maths': 'maths',
      'courses': 'course',
      'favourite': 'favourite',
      'learned': 'learn',
      'class': 'class',
      'music': 'music',
      'really': 'really',
      'good': 'good',
      'time': 'time',
      'last': 'last',
      'month': 'month',
      'art': 'art',
      'school': 'school',
      'many': 'many',
      'students': 'student',
      'showed': 'show',
      'talents': 'talent',
      'hope': 'hope',
      'take': 'take',
      'part': 'part',
      'next': 'next',
      'year': 'year',
      'home': 'home',
      'candles': 'candle',
      'make': 'make',
      'best': 'best',
      'wishes': 'wish',
      // 补充非核心单词的变体映射
      'rings': 'ring',
      'starts': 'start',
      'say': 'say',
      'try': 'try',
      'know': 'know',
      'play': 'play',
      'want': 'want',
      'come': 'come',
      'light': 'light'
    };

    let currentPage = 0;
    let isReading = false;
    let readAllMode = false;
    let translationVisible = false;
    let recognition = null;
    let isRecording = false;
    let isFollowReadMode = false;
    const storyPlayer = document.getElementById('storyPlayer');
    const wordPlayer = document.getElementById('wordPlayer');

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = false;
      recognition.interimResults = false;
    }

    function renderPage(idx) {
      const page = bookData[idx];
      const content = document.getElementById('bookContent');
      let html = `<img src="${page.image}" class="page-image">`;
      html += '<div class="text-container">';
      page.sentences.forEach((s, i) => {
        html += `<div class="sentence">`;
        s.en.split(/(\s+|[,."?!])/).forEach((w, wi) => {
          if (w.trim() && w.match(/[a-zA-Z]/)) {
            const clean = w.replace(/[,."?!]/g, '');
            html += `<span class="word" data-word="${clean}">${w}</span>`;
          } else { html += w; }
        });
        html += `</div><div class="chinese-translation ${translationVisible ? '' : 'hidden'}">${s.cn}</div>`;
      });
      html += '</div>';
      content.innerHTML = html;
      document.querySelectorAll('.word').forEach(el => el.addEventListener('click', handleWordClick));
      document.getElementById('pageIndicator').textContent = `第 ${idx + 1} 页 / 共 ${bookData.length} 页`;
      document.getElementById('prevBtn').disabled = idx === 0;
      document.getElementById('nextBtn').disabled = idx === bookData.length - 1;
    }

    function handleWordClick(e) {
      const target = e.target;
      const clickedWord = target.dataset.word;
      
      let prototypeWord = clickedWord;
      let data = dictionary[clickedWord];
      
      // 尝试查找原型或变体
      if (!data) {
        if (wordVariations[clickedWord.toLowerCase()]) {
          prototypeWord = wordVariations[clickedWord.toLowerCase()];
          data = dictionary[prototypeWord];
        } else if (dictionary[clickedWord.toLowerCase()]) {
          prototypeWord = clickedWord.toLowerCase();
          data = dictionary[prototypeWord];
        }
      }

      // 播放音频（优先使用 dictionary 中的音频）
      if (data && data.audio) {
        wordPlayer.src = data.audio;
        wordPlayer.play();
      } else {
        // 兜底：使用浏览器合成语音
        const u = new SpeechSynthesisUtterance(clickedWord);
        u.lang = 'en-US';
        speechSynthesis.speak(u);
      }

      target.classList.add('clicked');
      setTimeout(() => target.classList.remove('clicked'), 1000);
      
      // 显示信息
      if (data) {
        // 如果有详细信息（记忆法、短语等），显示大弹窗
        if (data.memory || data.phrases || data.variationNote) {
          showPopup(prototypeWord, data);
        } else {
          // 否则（非核心单词），显示简单的 Tooltip（包含音标和翻译）
          showSimpleTooltip(target, prototypeWord, data);
        }
      } else {
        // 完全未收录的单词
        showSimpleTooltip(target, clickedWord, { translation: '暂无释义', phonetic: '' });
      }
    }

    function showSimpleTooltip(element, word, data) {
      const old = document.querySelector('.simple-tooltip'); if(old) old.remove();
      const tooltip = document.createElement('div'); tooltip.className = 'simple-tooltip';
      // 确保显示音标和翻译
      tooltip.innerHTML = `<div style="font-weight:bold;margin-bottom:2px">${word} <span style="font-weight:normal;opacity:0.8;font-family:Arial;font-size:12px">${data.phonetic||''}</span></div><div>${data.translation}</div>`;
      document.body.appendChild(tooltip);
      const rect = element.getBoundingClientRect();
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
      tooltip.style.top = (rect.top + scrollTop) + 'px';
      tooltip.style.left = (rect.left + scrollLeft + rect.width / 2) + 'px';
      requestAnimationFrame(() => tooltip.classList.add('visible'));
      setTimeout(() => { tooltip.classList.remove('visible'); setTimeout(() => tooltip.remove(), 200); }, 3000);
    }

    function showPopup(word, data) {
      const overlay = document.createElement('div'); overlay.className = 'overlay';
      const popup = document.createElement('div'); popup.className = 'word-popup';
      popup.innerHTML = `<div class="popup-header"><div class="popup-word">${word}</div><div class="popup-phonetic">${data.phonetic||''}</div><div style="margin-top:12px;font-size:20px">${data.translation}</div></div>` +
        (data.memory ? `<div class="detail-card"><span class="detail-label">💡 记忆</span>${data.memory}</div>` : '') +
        (data.phrases ? `<div class="detail-card"><span class="detail-label">🔗 搭配</span>${data.phrases}</div>` : '') +
        (data.variationNote ? `<div class="detail-card"><span class="detail-label">📝 备注</span>${data.variationNote}</div>` : '') +
        `<div style="text-align:center;margin-top:24px"><button class="btn btn-success" onclick="playWordAudio('${data.audio}')">🔊 发音</button><button class="btn btn-primary" onclick="closePopup()" style="margin-left:12px">✅ 关闭</button></div>`;
      overlay.onclick = closePopup;
      document.body.append(overlay, popup);
      window.currPopup = { overlay, popup };
    }

    window.closePopup = () => { if(window.currPopup) { window.currPopup.overlay.remove(); window.currPopup.popup.remove(); window.currPopup = null; }};
    
    window.playWordAudio = (url) => {
      if (url && url !== 'undefined') {
        wordPlayer.src = url;
        wordPlayer.play();
      }
    };

    function readPage() {
      if (isReading) {
        storyPlayer.pause();
        isReading = false;
        document.getElementById('readPageBtn').textContent = '🔊 朗读本页';
        return;
      }
      
      const audioUrl = bookData[currentPage].audio;
      if (audioUrl) {
        storyPlayer.src = audioUrl;
        storyPlayer.play();
        isReading = true;
        document.getElementById('readPageBtn').textContent = '⏸️ 暂停';
        
        storyPlayer.onended = () => {
          isReading = false;
          document.getElementById('readPageBtn').textContent = '🔊 朗读本页';
        };
      }
    }

    function readAll() {
      if (readAllMode) {
        storyPlayer.pause();
        readAllMode = false;
        document.getElementById('readAllBtn').textContent = '▶️ 自动播放';
        return;
      }
      readAllMode = true;
      document.getElementById('readAllBtn').textContent = '⏸️ 暂停播放';
      playSequence(currentPage);
    }

    function playSequence(idx) {
      if (!readAllMode || idx >= bookData.length) {
        readAllMode = false;
        document.getElementById('readAllBtn').textContent = '▶️ 自动播放';
        return;
      }
      
      if (idx !== currentPage) {
        currentPage = idx;
        renderPage(idx);
      }
      
      const audioUrl = bookData[idx].audio;
      if (audioUrl) {
        storyPlayer.src = audioUrl;
        storyPlayer.play();
        storyPlayer.onended = () => {
          if (readAllMode) {
            setTimeout(() => playSequence(idx + 1), 1500);
          }
        };
      }
    }

    function startFollow() {
      if (!recognition) return alert('请使用Chrome浏览器');
      if (isRecording) { recognition.stop(); return; }
      if (isFollowReadMode) { isFollowReadMode = false; document.getElementById('readingMode').style.display = 'none'; document.getElementById('followReadBtn').textContent = '🎤 跟读挑战'; return; }
      isFollowReadMode = true; document.getElementById('readingMode').style.display = 'block'; document.getElementById('followReadBtn').textContent = '⏹️ 退出跟读';
      document.getElementById('feedbackContainer').style.display = 'none'; document.getElementById('scoreDisplay').textContent = ''; document.getElementById('starsDisplay').textContent = '';
      let count = 3; const cEl = document.getElementById('countdown'); cEl.textContent = count;
      const t = setInterval(() => { count--; if(count>0) cEl.textContent = count; else { clearInterval(t); cEl.textContent = 'GO!'; setTimeout(() => { cEl.textContent = ''; record(); }, 500); } }, 1000);
    }

    function record() {
      isRecording = true; document.getElementById('readingStatus').textContent = '🎤 正在录音...';
      recognition.onresult = (e) => { evaluate(e.results[0][0].transcript, e.results[0][0].confidence); };
      recognition.onend = () => { isRecording = false; };
      recognition.start();
    }

    function evaluate(spoken, conf) {
      const target = bookData[currentPage].sentences.map(s => s.en).join(' ').toLowerCase().replace(/[.,?!]/g, '').split(/\s+/);
      const words = spoken.toLowerCase().replace(/[.,?!]/g, '').split(/\s+/);
      let match = 0; const fb = [];
      target.forEach(w => { const ok = words.includes(w); if(ok) match++; fb.push({word: w, correct: ok}); });
      const score = Math.round((match / target.length) * 100);
      document.getElementById('scoreDisplay').textContent = score + '分';
      document.getElementById('starsDisplay').textContent = score >= 90 ? '⭐⭐⭐' : (score >= 60 ? '⭐⭐' : '⭐');
      document.getElementById('readingStatus').textContent = score >= 80 ? '🎉 太棒了！' : '💪 继续加油！';
      const fbList = document.getElementById('feedbackList'); fbList.innerHTML = '';
      fb.forEach(item => {
        const div = document.createElement('div'); div.className = `feedback-item ${item.correct ? 'correct' : 'incorrect'}`;
        div.innerHTML = `<span>${item.correct ? '✅' : '❌'}</span> <strong>${item.word}</strong>`;
        div.onclick = () => {
           if (dictionary[item.word] && dictionary[item.word].audio) {
             wordPlayer.src = dictionary[item.word].audio;
             wordPlayer.play();
           } else {
             const u = new SpeechSynthesisUtterance(item.word);
             speechSynthesis.speak(u);
           }
        };
        fbList.appendChild(div);
      });
      document.getElementById('feedbackContainer').style.display = 'block';
    }

    document.getElementById('prevBtn').onclick = () => { if(currentPage > 0) { currentPage--; renderPage(currentPage); storyPlayer.pause(); isReading = false; document.getElementById('readPageBtn').textContent = '🔊 朗读本页'; }};
    document.getElementById('nextBtn').onclick = () => { if(currentPage < bookData.length - 1) { currentPage++; renderPage(currentPage); storyPlayer.pause(); isReading = false; document.getElementById('readPageBtn').textContent = '🔊 朗读本页'; }};
    document.getElementById('readPageBtn').onclick = readPage;
    document.getElementById('readAllBtn').onclick = readAll;
    document.getElementById('followReadBtn').onclick = startFollow;
    document.getElementById('toggleTransBtn').onclick = () => { translationVisible = !translationVisible; renderPage(currentPage); };
    document.getElementById('retryBtn').onclick = startFollow;
    document.getElementById('closeBtn').onclick = () => { isFollowReadMode = false; document.getElementById('readingMode').style.display = 'none'; document.getElementById('followReadBtn').textContent = '🎤 跟读挑战'; };
    
    const audioBtn = document.getElementById('playFullAudioBtn');
    audioBtn.onclick = () => {
      if (readAllMode) {
        readAll();
        audioBtn.textContent = '🎵 完整故事磨耳朵';
      } else {
        currentPage = 0;
        renderPage(0);
        readAll();
        audioBtn.textContent = '⏹️ 停止播放';
      }
    };

    window.onload = () => { renderPage(0); };
  </script>

</body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>互動繪本</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
      background-color: #fff;
    }

    /* 容器佈局 */
    .iframe-container {
      box-sizing: border-box;
      padding: 56px 0 0 0; /* 頂部預留固定欄高度 */
      width: 100vw;
      height: 100vh;
      position: relative;
      background-color: #fff;
    }

    /* 頂部導航欄 - 徹底重寫樣式 */
    .custom-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 56px;
      z-index: 9999; /* 確保在最頂層 */
      display: flex;
      align-items: center;
      background-color: #FDD95A !important; /* 強制改為黃色 */
      padding: 0 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* 新 Logo 樣式 - 左對齊 */
    .custom-logo-img {
      height: 32px; /* 調整 Logo 高度 */
      width: auto;
      display: block;
      object-fit: contain;
    }

    /* iframe 樣式 */
    .content-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 針對電腦端的邊距優化 */
    @media (min-width: 769px) {
      .iframe-container {
        padding: 56px 20px 20px 20px;
      }
      .content-iframe {
        border: 0.5px solid #C9DACC;
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="custom-header">
    <img src="LOGO.png" alt="Logo" class="custom-logo-img">
  </div>

  <div class="iframe-container" id="mainContainer">
    <iframe class="content-iframe"
      src="https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/document/ivhRhRcZgD7DULCaQkEVUB.html"
      frameborder="0"
      allow="microphone *; camera *; autoplay *;">
    </iframe>
  </div>

  <script>
    // 簡單的手機端適配邏輯
    function checkLayout() {
      const width = document.documentElement.clientWidth;
      const isMobile = width <= 768;
      const container = document.getElementById('mainContainer');
      
      if (isMobile) {
        container.style.padding = "56px 0 0 0";
        // 針對極窄屏幕的字體適配
        document.documentElement.style.fontSize = (width / 375 * 100).toFixed(2) + 'px';
      } else {
        container.style.padding = "56px 20px 20px 20px";
      }
    }

    window.addEventListener('resize', checkLayout);
    document.addEventListener('DOMContentLoaded', checkLayout);
  </script>
</body>
</html>
